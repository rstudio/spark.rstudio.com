name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Quarto
        id: cache-quarto
        uses: actions/cache@v4
        with:
          path: /opt/quarto
          key: quarto-1.8.27

      - name: Install Quarto
        if: steps.cache-quarto.outputs.cache-hit != 'true'
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.27

      - name: Add Quarto to PATH
        if: steps.cache-quarto.outputs.cache-hit == 'true'
        run: echo "/opt/quarto/bin" >> $GITHUB_PATH

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install downlit
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::downlit any::xml2

      - name: Render site
        run: quarto render

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=docs ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
